- name: cart configure
  hosts: cart
  become: yes
  tasks:
  - name: disable nodejs default version
    ansible.builtin.command: dnf module disable nodejs -y
  
  - name: Enable Node.js 20 install nodejs package
    ansible.builtin.dnf:
      name: "@nodejs:20"
      state: present
  
  - name: Create a system user 
    ansible.builtin.user:
        name: roboshop
        comment: "roboshop system user" 
        home: /app        # Set primary group to 'myapp'
        shell: /sbin/nologin  # Prevents interactive login
        system: yes           # Designates as a system account
        state: present

  - name: delete app directory # deleting before creating bcz if developer change the code 
    ansible.builtin.file:
      path: /app
      state: absent    

  - name: Create app directory 
    ansible.builtin.file:
      path: /app
      state: directory
  
  - name: delete cart zip file   # delete before downloading again
    ansible.builtin.file:
      path: /tmp/cart.zip
      state: absent
  
  - name: Download cart code 
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/cart-v3.zip
      dest: /tmp/cart.zip
  
  - name: unzip the code 
    ansible.builtin.unarchive:
      src: /tmp/cart.zip
      dest: /app
      remote_src: yes

  - name: install dependencies
    community.general.npm:
      path: /app

  - name: copying System service file
    ansible.builtin.template:
      src: cart.service
      dest: /etc/systemd/system/cart.service

  - name: daemon_reload
    ansible.builtin.systemd_service:
      name: cart
      state: restarted
      daemon_reload: true
      
      
  - name: Enable and start cart
    ansible.builtin.systemd_service:
      name: cart
      state: restarted
      enabled: true
    