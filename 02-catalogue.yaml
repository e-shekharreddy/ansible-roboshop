- name: catalogue configure
  hosts: catalogue
  become: yes
  tasks:
  - name: disable nodejs default version
    ansible.builtin.command: dnf module disable nodejs -y
  
  - name: Enable Node.js 20 install nodejs package
    ansible.builtin.dnf:
      name: "@nodejs:20"
      state: present
  
  - name: Create a system user 
    ansible.builtin.user:
        name: roboshop
        comment: "roboshop system user" 
        home: /app        # Set primary group to 'myapp'
        shell: /sbin/nologin  # Prevents interactive login
        system: yes           # Designates as a system account
        state: present

  - name: delete app directory # deleting before creating bcz if developer change the code 
    ansible.builtin.file:
      path: /app
      state: absent    

  - name: Create app directory 
    ansible.builtin.file:
      path: /app
      state: directory
  
  - name: delete catalogue zip file   # delete before downloading again
    ansible.builtin.file:
      path: /tmp/catalogue.zip
      state: absent
  
  - name: Download catalogue code 
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/catalogue-v3.zip
      dest: /tmp/catalogue.zip
  
  - name: unzip the code 
    ansible.builtin.unarchive:
      src: /tmp/catalogue.zip
      dest: /app
      remote_src: yes

  - name: install dependencies
    community.general.npm:
      path: /app

  - name: copying System service file
    ansible.builtin.template:
      src: catalogue.service
      dest: /etc/systemd/system/catalogue.service

  - name: daemon_reload
    ansible.builtin.systemd_service:
      state: restarted
      daemon_reload: true
      name: catalogue
      

  - name: copying mongo.repo
    ansible.builtin.copy:
      src: mongo.repo
      dest: /etc/yum.repos.d/mongo.repo

  - name: install mongo client
    ansible.builtin.dnf:
      name: mongodb-mongosh
      state: present

  - name: check products loaded
    ansible.builtin.command: mongosh --host "{{ MONGODB_HOST }}" --quiet --eval 'db.getMongo().getDBNames().indexOf("catalogue")'
    register: catalogue_output

  - name: print the output
    ansible.builtin.debug:
      msg: "{{ catalogue_output }}"

  - name: products loading
    ansible.builtin.shell: mongosh --host "{{ MONGODB_HOST }}" </app/db/master-data.js
    when: catalogue_output.stdout | int < 0

  - name: Enable and start catalogue
    ansible.builtin.systemd_service:
      name: catalogue
      state: restarted
      enabled: true
    