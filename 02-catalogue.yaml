- name: catalogue configure
  hosts: catalogue
  become: yes
  tasks:
  - name: disable nodejs default version
    ansible.builtin.command: dnf module disable nodejs -y
  
  - name: Enable Node.js 20 module stream and install nodejs package
    ansible.builtin.dnf:
      name: "@nodejs:20"
      state: present
  
  - name: Create a system user 
    ansible.builtin.user:
        name: roboshop
        comment: "roboshop system user" 
        home: /app        # Set primary group to 'myapp'
        shell: /sbin/nologin  # Prevents interactive login
        system: yes           # Designates as a system account
        state: present

  # - name: delete app directory
  #   ansible.builtin.file:
  #     path: /app
  #     state: absent    

  - name: Create app directory 
    ansible.builtin.file:
      path: /app
      state: directory
  
  # - name: delete catalogue zip file
  #   ansible.builtin.file:
  #     path: /tmp/catalogue.zip
  #     state: absent
  
  - name: Download catalogue code 
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/catalogue-v3.zip
      dest: /tmp/catalogue.zip
  
  - name: unzip the code 
    ansible.builtin.unarchive:
      src: /app
      dest: /tmp/catalogue.zip
      remote_src: yes

  - name: install dependencies
    community.general.npm:
      path: /app

  - name: copying System service file
    ansible.builtin.copy:
      src: catalogue.service
      dest: /etc/systemd/system/catalogue.service

  - name: daemon_reload
    ansible.builtin.systemd_service:
      state: restarted
      daemon_reload: true
      name: catalogue
      

  - name: copying mongo.repo
    ansible.builtin.copy:
    src: mongo.repo
    dest: /etc/yum.repos.d/mongo.repo

  - name: install mongdb clint
    ansible.builtin.dnf:
    name: mongodb-mongosh
    state: present

  


  - name: Enable and start catalogue
    ansible.builtin.systemd_service:
      name: catalogue
      state: restarted
      enabled: true
    