- name: frontend configure
  hosts: frontend
  become: yes

  tasks:
  - name: enable nginx 1.24
    ansible.builtin.command: dnf module enable nginx:1.24 -y

  - name: install nginx
    ansible.builtin.dnf:
      name: nginx
      state: present


  - name: removeing directory 
    ansible.builtin.file:
      path: /usr/share/nginx/html
      state: absent

  - name: createing directory
    ansible.builtin.file:
      path: /usr/share/nginx/html
      state: directory


  - name: downloading the frontend code
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/frontend-v3.zip
      dest: /tmp/frontend.zip
    

  - name: unzip the code
    ansible.builtin.unarchive:
      src: /tmp/frontend.zip
      dest: /usr/share/nginx/html 
      remote_src: yes

  - name: removeing default nginx conf
    ansible.builtin.file:
      path: /etc/nginx/nginx.conf
      state: absent

  - name: copy the conf file
    ansible.builtin.template:
      src: nginx.conf
      dest: /etc/nginx/nginx.conf

  - name: restart  nginx
    ansible.builtin.systemd:
      name: nginx
      daemon_reload: yes
      state: started
      enabled: yes

  
