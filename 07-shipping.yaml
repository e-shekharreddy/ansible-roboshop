- name: shipping configure
  hosts: shipping
  become: yes
  tasks:
  - name: install maven
    ansible.builtin.dnf:
      name: maven # "{{ item }}"
      state: present
      # loop:
      # - maven
      # - mysql 

  - name: Create a system user 
    ansible.builtin.user:
        name: roboshop
        comment: "roboshop system user" 
        home: /app        
        shell: /sbin/nologin  
        system: yes           
        state: present

  - name: delete app directory # deleting before creating bcz if developer change the code 
    ansible.builtin.file:
      path: /app
      state: absent    

  - name: Create app directory 
    ansible.builtin.file:
      path: /app
      state: directory
  
  - name: delete shipping zip file   # delete before downloading again
    ansible.builtin.file:
      path: /tmp/shipping.zip
      state: absent
  
  - name: Download shipping code 
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/shipping-v3.zip
      dest: /tmp/shipping.zip
  
  - name: unzip the code 
    ansible.builtin.unarchive:
      src: /tmp/shipping.zip
      dest: /app
      remote_src: yes

  - name: install dependencies
    ansible.builtin.command: mvn clean package
    args:
      chdir: /app

  - name: install dependencies
    ansible.builtin.command: mv target/shipping-1.0.jar shipping.jar 
    args:
      chdir: /app

  - name: copying System service file
    ansible.builtin.template:
      src: shipping.service
      dest: /etc/systemd/system/shipping.service

  - name: daemon_reload
    ansible.builtin.systemd_service:
      state: restarted
      daemon_reload: true
      name: shipping

  - name: installing mysql client # we loop this at top in install maven task
    ansible.builtin.dnf:
      name: mysql
      state: present

  - name: install dependencies
    ansible.builtin.pip: 
      name: "{{ item }}"
      excutable: pip3.9
    loop:
    - PyMySQL
    - cryptography 
      

  - name: loading data or schema or import shipping data 
    community.mysql.mysql_db:
      state: import
      name: all
      login_host: "{{ MYSQL_HOST }}"
      login_user: root
      login_password: RoboShop@1
      target: "{{ item }}"
      loop:
      - /app/db/schema.sql
      - /app/db/app-user.sql 
      - /app/db/master-data.sql

  - name: start and enable shipping
    ansible.builtin.systemd_service:
      name: shipping
      state: restarted
      enabled: true

      