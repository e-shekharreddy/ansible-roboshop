- name: create ec2 instant records
  hosts: all
  connection: local
  become: yes
  vars:
    ami_id: "ami-0220d79f3f480ecf5"
    sg_id: "sg-078ee4211bd66ef16"
    ENV: dev
    domine_name: "tsmvr.fun"
    instances:
    - mongodb
    - catalogue
  tasks:
  - name: Launch ec2 instance
    amazon.aws.ec2_instance:
      instance_type: "t3.micro"
      image_id: "{{ ami_id }}"
      security_group: "{{ sg_id }}"
      name: "{{ item }}-{{ ENV }}"
      tags:
        Project: roboshop
        ENV: "{{ ENV }}"
        component: "{{ item }}"
        Name: "{{ item }}-{{ ENV }}"
    loop: "{{ instances }}"
    register: ec2_output

  - name: print output
    ansible.builtin.debug:
     msg: "{{ ec2_output }}"