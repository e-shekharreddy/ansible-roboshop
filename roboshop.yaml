- name: create ec2 instant records
  hosts: all
  connection: local
  become: yes
  vars:
    ami_id: "ami-0220d79f3f480ecf5"
    sg_id:
    ENV: dev
    domine_name: "tsmvr.fun"
    instance:
    - mongodb
    - catalogue
  tasks:
  - name: Launch ec2 instance
    amazon.aws.ec2_instance:
      instance_type: t3.micro
      image_id: "ami_id"
      security_group: 
      name: "{{ item }}.{{ ENV }}
      tags:
        project: "roboshop"
        ENV: "{{ ENV }}"
        component: "{{ item }}"
      register: user_output
  - name: print output
    ansible.builtin.debug:
     msg: "{{ user_output }}"