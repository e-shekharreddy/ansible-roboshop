- name: mysql configure
  hosts: mysql
  become: yes

  tasks:
  - name: install mysql server
    ansible.builtin.dnf:
      name: mysql-server
      state: present

  - name: enable and start mysqld
    ansible.builtin.service:
      name: mysqld
      state: restarted
      enabled: yes

  - name: Set root password roboshop
    ansible.builtin.command: mysql_secure_installation --set-root-pass RoboShop@1

